    <text class="info" x="350" y="312">WhoIsMrSentry @github.com</text>
    <text class="info" x="350" y="340">--------------------------</text>
    <text class="info" x="350" y="368">OS:</text><text class="txt" x="394" y="368">GitHub</text>
    <text class="info" x="350" y="394">Host:</text><text class="txt" x="408" y="394">github.com</text>
    <text class="info" x="350" y="420">Repos:</text><text class="txt" x="415" y="420">76</text>
    <text class="info" x="350" y="446">Public Repos:</text><text class="txt" x="490" y="446">59</text>
    <text class="info" x="350" y="472">Contributions:</text><text class="txt" x="501" y="472">3027</text>
    <text class="info" x="350" y="498">Commits:</text><text class="txt" x="436" y="498">2571</text>
    <text class="info" x="350" y="524">Pull Requests:</text><text class="txt" x="501" y="524">217</text>
    <text class="info" x="350" y="550">Issues:</text><text class="txt" x="416" y="550">0</text>
    <text class="info" x="350" y="576">Followers:</text><text class="txt" x="458" y="576">23</text>
    <text class="info" x="350" y="602">Stars:</text><text class="txt" x="410" y="602">18</text>
    <text class="info" x="350" y="628">Gists:</text><text class="txt" x="404" y="628">0</text>
  </g>

  <g>
    <animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.55;0.55;1" dur="40s" repeatCount="indefinite" calcMode="discrete"/>
    <text class="prompt" x="44" y="680">WhoIsMrSentry@github.com:~$</text>
    <text class="cmd" x="340" y="680" clip-path="url(#clip-uptime)">uptime</text>
  </g>

  <g>
    <animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.5875;0.5875;1" dur="40s" repeatCount="indefinite" calcMode="discrete"/>
    <text class="txt" x="44" y="706">3 years, 46 days</text>
  </g>

  <g>
    <animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.625;0.625;1" dur="40s" repeatCount="indefinite" calcMode="discrete"/>
    <text class="prompt" x="44" y="742">WhoIsMrSentry@github.com:~$</text>
    <text class="cmd" x="340" y="742" clip-path="url(#clip-about)">cat about.txt</text>
  </g>

  <g>
    <animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.675;0.675;1" dur="40s" repeatCount="indefinite" calcMode="discrete"/>
    <text class="txt" x="44" y="768">Building robotics and edge AI systems with production-first engineering.</text>
    <text class="txt" x="44" y="794">Focused on reliable automation, maintainable code, and measurable results.</text>
  </g>

  <g>
    <animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.825;0.825;1" dur="40s" repeatCount="indefinite" calcMode="discrete"/>
    <text class="prompt" x="44" y="828">WhoIsMrSentry@github.com:~$</text>
    <text class="cmd" x="340" y="828" clip-path="url(#clip-exit)">exit</text>
  </g>

  <rect class="cursor" x="396" y="810" width="10" height="20">
    <animate attributeName="opacity" values="1;0;1;0;1;0;1;0;1" keyTimes="0;0.85;0.86;0.87;0.88;0.89;0.90;0.91;1" dur="40s" repeatCount="indefinite"/>
