<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="920" height="900" viewBox="0 0 920 900" role="img" aria-labelledby="title desc">
  <title id="title">Animated Profile Terminal</title>
  <desc id="desc">Terminal session with whoami, profile summary, neofetch stats, uptime, about and exit.</desc>

  <defs>
    <style>
      .outer { fill: #200009; }
      .terminal { fill: #200009; }
      .head { fill: #15000a; }
      .frame { fill: none; stroke: #88001b; stroke-width: 2; }
      .prompt { fill: #39ff14; font: 700 18px Monaco, Consolas, Menlo, monospace; }
      .cmd { fill: #ff5f58; font: 500 18px Monaco, Consolas, Menlo, monospace; }
      .txt { fill: #e6e6e6; font: 500 17px Monaco, Consolas, Menlo, monospace; }
      .info { fill: #ff5f58; font: 500 17px Monaco, Consolas, Menlo, monospace; }
      .ascii { fill: #39ff14; font: 500 4.5px Monaco, Consolas, Menlo, monospace; }
      .cursor { fill: #88001b; }
    </style>

    <clipPath id="clip-whoami" clipPathUnits="userSpaceOnUse">
      <rect x="340" y="86" height="26" width="0">
        <animate attributeName="width" values="0;0;92;92;0" keyTimes="0;0.02;0.05;0.97;1" dur="40s" repeatCount="indefinite"/>
      </rect>
    </clipPath>
    <clipPath id="clip-profile" clipPathUnits="userSpaceOnUse">
      <rect x="340" y="150" height="26" width="0">
        <animate attributeName="width" values="0;0;210;210;0" keyTimes="0;0.0875;0.145;0.97;1" dur="40s" repeatCount="indefinite"/>
      </rect>
    </clipPath>
    <clipPath id="clip-neofetch" clipPathUnits="userSpaceOnUse">
      <rect x="340" y="252" height="26" width="0">
        <animate attributeName="width" values="0;0;120;120;0" keyTimes="0;0.2;0.2375;0.97;1" dur="40s" repeatCount="indefinite"/>
      </rect>
    </clipPath>
    <clipPath id="clip-uptime" clipPathUnits="userSpaceOnUse">
      <rect x="340" y="660" height="26" width="0">
        <animate attributeName="width" values="0;0;96;96;0" keyTimes="0;0.55;0.5875;0.97;1" dur="40s" repeatCount="indefinite"/>
      </rect>
    </clipPath>
    <clipPath id="clip-about" clipPathUnits="userSpaceOnUse">
      <rect x="340" y="722" height="26" width="0">
        <animate attributeName="width" values="0;0;170;170;0" keyTimes="0;0.625;0.675;0.97;1" dur="40s" repeatCount="indefinite"/>
      </rect>
    </clipPath>
    <clipPath id="clip-exit" clipPathUnits="userSpaceOnUse">
      <rect x="340" y="808" height="26" width="0">
        <animate attributeName="width" values="0;0;52;52;0" keyTimes="0;0.825;0.85;0.97;1" dur="40s" repeatCount="indefinite"/>
      </rect>
    </clipPath>
  </defs>

  <rect class="outer" x="0" y="0" width="920" height="900" rx="16"/>
  <rect class="terminal" x="22" y="22" width="876" height="856" rx="10"/>
  <rect class="frame" x="22" y="22" width="876" height="856" rx="10"/>
  <rect class="head" x="22" y="22" width="876" height="42" rx="10"/>

  <circle cx="46" cy="43" r="7" fill="#ff5f58"/>
  <circle cx="68" cy="43" r="7" fill="#ffbd2e"/>
  <circle cx="90" cy="43" r="7" fill="#18c132"/>

  <g>
    <animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.02;0.02;1" dur="40s" repeatCount="indefinite" calcMode="discrete"/>
    <text class="prompt" x="44" y="106">WhoIsMrSentry@github.com:~$</text>
    <text class="cmd" x="340" y="106" clip-path="url(#clip-whoami)">whoami</text>
  </g>

  <g>
    <animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.05;0.05;1" dur="40s" repeatCount="indefinite" calcMode="discrete"/>
    <text class="txt" x="44" y="134">Emir Hamurcu</text>
  </g>

  <g>
    <animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.0875;0.0875;1" dur="40s" repeatCount="indefinite" calcMode="discrete"/>
    <text class="prompt" x="44" y="170">WhoIsMrSentry@github.com:~$</text>
    <text class="cmd" x="340" y="170" clip-path="url(#clip-profile)">./profile --summary</text>
  </g>

  <g>
    <animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.145;0.145;1" dur="40s" repeatCount="indefinite" calcMode="discrete"/>
    <text class="info" x="44" y="200">Focus:</text><text class="txt" x="126" y="200">Robotics &amp; Embedded AI</text>
    <text class="info" x="44" y="226">Role:</text><text class="txt" x="126" y="226">Embedded System Developer</text>
    <text class="info" x="44" y="252">Status:</text><text class="txt" x="126" y="252">Open to Collaboration</text>
  </g>

  <g>
    <animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.2;0.2;1" dur="40s" repeatCount="indefinite" calcMode="discrete"/>
    <text class="prompt" x="44" y="272">WhoIsMrSentry@github.com:~$</text>
    <text class="cmd" x="340" y="272" clip-path="url(#clip-neofetch)">neofetch</text>
  </g>

