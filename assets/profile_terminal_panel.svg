<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="920" height="760" viewBox="0 0 920 760" role="img" aria-labelledby="title desc">
  <title id="title">Animated Profile Terminal</title>
  <desc id="desc">Single terminal session: whoami, profile summary, neofetch, uptime, about and exit.</desc>

  <defs>
    <style>
      .outer { fill: #200009; }
      .terminal { fill: #200009; }
      .head { fill: #15000a; }
      .frame { fill: none; stroke: #88001b; stroke-width: 2; }
      .prompt { fill: #39ff14; font: 700 18px Monaco, Consolas, Menlo, monospace; }
      .cmd { fill: #ff5f58; font: 500 18px Monaco, Consolas, Menlo, monospace; }
      .txt { fill: #e6e6e6; font: 500 17px Monaco, Consolas, Menlo, monospace; }
      .info { fill: #ff5f58; font: 500 17px Monaco, Consolas, Menlo, monospace; }
      .ascii { fill: #00ee00; font: 700 17px Monaco, Consolas, Menlo, monospace; }
      .cursor { fill: #88001b; }
    </style>

    <clipPath id="clip-whoami" clipPathUnits="userSpaceOnUse"><rect x="340" y="88" width="92" height="28"><animate attributeName="width" from="0" to="92" dur="1.2s" begin="loop.begin+1.0s" fill="freeze"/></rect></clipPath>
    <clipPath id="clip-profile" clipPathUnits="userSpaceOnUse"><rect x="340" y="152" width="300" height="28"><animate attributeName="width" from="0" to="300" dur="2.1s" begin="loop.begin+3.8s" fill="freeze"/></rect></clipPath>
    <clipPath id="clip-neofetch" clipPathUnits="userSpaceOnUse"><rect x="340" y="254" width="120" height="28"><animate attributeName="width" from="0" to="120" dur="1.3s" begin="loop.begin+8.2s" fill="freeze"/></rect></clipPath>
    <clipPath id="clip-uptime" clipPathUnits="userSpaceOnUse"><rect x="340" y="570" width="96" height="28"><animate attributeName="width" from="0" to="96" dur="1.1s" begin="loop.begin+15.4s" fill="freeze"/></rect></clipPath>
    <clipPath id="clip-about" clipPathUnits="userSpaceOnUse"><rect x="340" y="632" width="170" height="28"><animate attributeName="width" from="0" to="170" dur="1.5s" begin="loop.begin+17.7s" fill="freeze"/></rect></clipPath>
    <clipPath id="clip-exit" clipPathUnits="userSpaceOnUse"><rect x="340" y="706" width="52" height="28"><animate attributeName="width" from="0" to="52" dur="0.9s" begin="loop.begin+22.6s" fill="freeze"/></rect></clipPath>
  </defs>

  <rect class="outer" x="0" y="0" width="920" height="760" rx="16"/>
  <rect class="terminal" x="22" y="22" width="876" height="716" rx="10"/>
  <rect class="frame" x="22" y="22" width="876" height="716" rx="10"/>
  <rect class="head" x="22" y="22" width="876" height="42" rx="10"/>

  <circle cx="46" cy="43" r="7" fill="#ff5f58"/>
  <circle cx="68" cy="43" r="7" fill="#ffbd2e"/>
  <circle cx="90" cy="43" r="7" fill="#18c132"/>

  <rect x="0" y="0" width="1" height="1" fill="transparent">
    <animate id="loop" attributeName="opacity" values="1;1" dur="30s" repeatCount="indefinite"/>
  </rect>

  <g opacity="1">
    <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.03;0.03;0.98;0.98" dur="30s" begin="loop.begin" repeatCount="indefinite" calcMode="discrete"/>
    <text class="prompt" x="44" y="106">WhoIsMrSentry@github.com:~$</text>
    <text class="cmd" x="340" y="106" clip-path="url(#clip-whoami)">whoami</text>
  </g>

  <g opacity="1">
    <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.10;0.10;0.98;0.98" dur="30s" begin="loop.begin" repeatCount="indefinite" calcMode="discrete"/>
    <text class="txt" x="44" y="134">Emir Hamurcu</text>
  </g>

  <g opacity="1">
    <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.12;0.12;0.98;0.98" dur="30s" begin="loop.begin" repeatCount="indefinite" calcMode="discrete"/>
    <text class="prompt" x="44" y="170">WhoIsMrSentry@github.com:~$</text>
    <text class="cmd" x="340" y="170" clip-path="url(#clip-profile)">./profile --summary</text>
  </g>

  <g opacity="1">
    <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.21;0.21;0.98;0.98" dur="30s" begin="loop.begin" repeatCount="indefinite" calcMode="discrete"/>
    <text class="info" x="44" y="200">Focus:</text><text class="txt" x="126" y="200">Robotics &amp; Embedded AI</text>
    <text class="info" x="44" y="226">Role:</text><text class="txt" x="126" y="226">Embedded System Developer</text>
    <text class="info" x="44" y="252">Status:</text><text class="txt" x="126" y="252">Open to Collaboration</text>
  </g>

  <g opacity="1">
    <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.27;0.27;0.98;0.98" dur="30s" begin="loop.begin" repeatCount="indefinite" calcMode="discrete"/>
    <text class="prompt" x="44" y="272">WhoIsMrSentry@github.com:~$</text>
    <text class="cmd" x="340" y="272" clip-path="url(#clip-neofetch)">neofetch</text>
  </g>

  <g opacity="1">
    <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.34;0.34;0.98;0.98" dur="30s" begin="loop.begin" repeatCount="indefinite" calcMode="discrete"/>
    <g fill="#00ee00">
      <rect x="124" y="304" width="68" height="14"/>
      <rect x="100" y="328" width="116" height="14"/>

      <rect x="84" y="352" width="28" height="14"/>
      <rect x="124" y="352" width="68" height="14"/>
      <rect x="204" y="352" width="28" height="14"/>

      <rect x="76" y="376" width="36" height="14"/>
      <rect x="204" y="376" width="36" height="14"/>

      <rect x="76" y="400" width="36" height="14"/>
      <rect x="204" y="400" width="36" height="14"/>

      <rect x="76" y="424" width="28" height="14"/>
      <rect x="212" y="424" width="28" height="14"/>

      <rect x="76" y="448" width="36" height="14"/>
      <rect x="204" y="448" width="36" height="14"/>

      <rect x="76" y="472" width="44" height="14"/>
      <rect x="196" y="472" width="44" height="14"/>

      <rect x="84" y="496" width="20" height="14"/>
      <rect x="108" y="496" width="36" height="14"/>
      <rect x="172" y="496" width="60" height="14"/>

      <rect x="92" y="520" width="20" height="14"/>
      <rect x="180" y="520" width="44" height="14"/>

      <rect x="92" y="544" width="20" height="14"/>
      <rect x="180" y="544" width="44" height="14"/>
    </g>

    <text class="info" x="350" y="312">WhoIsMrSentry @github.com</text>
    <text class="info" x="350" y="340">--------------------------</text>
    <text class="info" x="350" y="368">OS:</text><text class="txt" x="394" y="368">GitHub</text>
    <text class="info" x="350" y="394">Repos:</text><text class="txt" x="430" y="394">76</text>
    <text class="info" x="350" y="420">Public Repos:</text><text class="txt" x="490" y="420">46</text>
    <text class="info" x="350" y="446">Contributions:</text><text class="txt" x="500" y="446">1452</text>
    <text class="info" x="350" y="472">Followers:</text><text class="txt" x="460" y="472">22</text>
    <text class="info" x="350" y="498">Pull Requests:</text><text class="txt" x="500" y="498">163</text>
    <text class="info" x="350" y="524">Commits:</text><text class="txt" x="446" y="524">1102</text>
  </g>

  <g opacity="1">
    <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.51;0.51;0.98;0.98" dur="30s" begin="loop.begin" repeatCount="indefinite" calcMode="discrete"/>
    <text class="prompt" x="44" y="588">WhoIsMrSentry@github.com:~$</text>
    <text class="cmd" x="340" y="588" clip-path="url(#clip-uptime)">uptime</text>
  </g>

  <g opacity="1">
    <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.56;0.56;0.98;0.98" dur="30s" begin="loop.begin" repeatCount="indefinite" calcMode="discrete"/>
    <text class="txt" x="44" y="614">2 years, 330 days</text>
  </g>

  <g opacity="1">
    <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.59;0.59;0.98;0.98" dur="30s" begin="loop.begin" repeatCount="indefinite" calcMode="discrete"/>
    <text class="prompt" x="44" y="650">WhoIsMrSentry@github.com:~$</text>
    <text class="cmd" x="340" y="650" clip-path="url(#clip-about)">cat about.txt</text>
  </g>

  <g opacity="1">
    <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.65;0.65;0.98;0.98" dur="30s" begin="loop.begin" repeatCount="indefinite" calcMode="discrete"/>
    <text class="txt" x="44" y="676">Building robotics and edge AI systems with production-first engineering.</text>
    <text class="txt" x="44" y="700">Focused on reliable automation, maintainable code, and measurable results.</text>
  </g>

  <g opacity="1">
    <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.74;0.74;0.98;0.98" dur="30s" begin="loop.begin" repeatCount="indefinite" calcMode="discrete"/>
    <text class="prompt" x="44" y="724">WhoIsMrSentry@github.com:~$</text>
    <text class="cmd" x="340" y="724" clip-path="url(#clip-exit)">exit</text>
  </g>

  <rect class="cursor" x="396" y="706" width="10" height="20" opacity="1">
    <animate attributeName="opacity" values="0;0;1;0;1;0;1;0" keyTimes="0;0.92;0.93;0.94;0.95;0.96;0.97;1" dur="30s" begin="loop.begin" repeatCount="indefinite" calcMode="discrete"/>
  </rect>
</svg>
